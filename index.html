<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex ABNT - Alisson Edition Pro v9</title>
    
    <!-- Bibliotecas Necessárias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxSDZ3J_Q9sdVkC9S7wYmqSbTjatxLab0",
            authDomain: "formatador-abnt-multiusuarios.firebaseapp.com",
            projectId: "formatador-abnt-multiusuarios",
            storageBucket: "formatador-abnt-multiusuarios.firebasestorage.app",
            messagingSenderId: "939976247624",
            appId: "1:939976247624:web:d142f11e531234507a0b7d"
        };

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch, firebaseConfig };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #e2e8f0; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* --- CONFIGURAÇÃO DE IMPRESSÃO ABNT --- */
        @media print {
            @page { 
                size: A4; 
                margin: 0; 
            }
            body { 
                background: white !important; 
                overflow: visible !important;
            }
            .print-hidden, aside, header, #ui-root { 
                display: none !important; 
            }
            #print-portal { 
                display: block !important; 
                visibility: visible !important;
                background: white !important;
            }
            .abnt-page { 
                page-break-after: always !important; 
                break-after: page !important;
                display: block !important;
                width: 210mm !important;
                height: 297mm !important;
                padding: 3cm 2cm 2cm 3cm !important;
                box-sizing: border-box !important;
                background: white !important;
                position: relative !important;
                color: black !important;
            }
            /* Remove ícones de extensões e assistentes */
            div[class*="grammarly"], grammarly-extension, [data-grammarly-part], 
            div[style*="z-index: 2147483647"], .no-print { 
                display: none !important; 
                opacity: 0 !important;
            }
        }
        
        /* Visualização na Web */
        .abnt-page-web {
            width: 21cm;
            min-height: 29.7cm;
            padding: 3cm 2cm 2cm 3cm;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin: 20px auto;
            position: relative;
            box-sizing: border-box;
            color: black;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MANDATORY_SECTIONS = [
            { title: 'Capa', content: 'UNIVERSIDADE FEDERAL DO RIO DE JANEIRO\nCENTRO DE CIÊNCIAS JURÍDICAS E ECONÔMICAS\nFACULDADE DE DIREITO\n\n\nALISSON CAMBUI DA SILVA\n\n\nINIMPUTABILIDADE PENAL: OS ASPECTOS LEGAIS RELATIVOS AO ACUSADO PORTADOR DE SOFRIMENTO PSÍQUICO\n\n\nRio de Janeiro\n2026', type: 'cover', order: 0 },
            { title: 'Folha de Rosto', content: 'ALISSON CAMBUI DA SILVA\n\n\nINIMPUTABILIDADE PENAL: OS ASPECTOS LEGAIS RELATIVOS AO ACUSADO PORTADOR DE SOFRIMENTO PSÍQUICO\n\n\nMonografia de final de curso apresentada à Faculdade de Direito da UFRJ.\n\nRio de Janeiro\n2026', type: 'title_page', order: 1 },
            { title: 'Resumo', content: 'Resumo aqui...', type: 'pre-textual', order: 2 },
            { title: 'Sumário', content: 'INTRODUÇÃO\n1. DESENVOLVIMENTO\nCONCLUSÃO\nREFERÊNCIAS', type: 'pre-textual', order: 3 },
            { title: 'Introdução', content: 'O presente trabalho analisa...', type: 'textual', order: 4 },
            { title: 'Desenvolvimento', content: 'Inicie o seu desenvolvimento. Este sistema irá calcular automaticamente se o texto ultrapassa uma folha e ajustará a numeração das próximas páginas.', type: 'textual', order: 5 },
            { title: 'Conclusão', content: 'Em conclusão...', type: 'textual', order: 6 },
            { title: 'Referências Bibliográficas', content: 'AMARANTE, Paulo. Loucos pela Vida. Rio de Janeiro: Fiocruz, 2013.', type: 'references', order: 7 },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [authStatus, setAuthStatus] = useState('loading');
            const [sections, setSections] = useState([]);
            const [activeSectionId, setActiveSectionId] = useState(null);
            const [localText, setLocalText] = useState('');
            const [viewMode, setViewMode] = useState('edit');
            const [syncStatus, setSyncStatus] = useState('synced');
            const [isExportingAll, setIsExportingAll] = useState(false);
            const [fontFamily, setFontFamily] = useState('Arial');

            const isTypingRef = useRef(false);
            const activeIdRef = useRef(null);

            useEffect(() => { if (window.lucide) lucide.createIcons(); });

            useEffect(() => {
                const initFirebase = async () => {
                    if (window.FB) {
                        const app = window.FB.initializeApp(window.FB.firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        try { await window.FB.signInAnonymously(auth); } catch (e) { setAuthStatus('error'); }
                        window.FB.onAuthStateChanged(auth, (u) => { if (u) { setUser(u); setAuthStatus('authenticated'); } });
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const appId = 'abnt-ufrj-alisson-v9';
                const sectionsRef = window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'sections');

                const unsub = window.FB.onSnapshot(sectionsRef, (snap) => {
                    if (snap.empty) {
                        const batch = window.FB.writeBatch(db);
                        MANDATORY_SECTIONS.forEach(sec => {
                            const newDoc = window.FB.doc(sectionsRef);
                            batch.set(newDoc, { ...sec, createdAt: Date.now(), lastEditedBy: user.uid });
                        });
                        batch.commit();
                    } else {
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => a.order - b.order);
                        setSections(docs);
                        if (!activeIdRef.current && docs.length > 0) {
                            setActiveSectionId(docs[0].id);
                            activeIdRef.current = docs[0].id;
                        }
                    }
                });
                return () => unsub();
            }, [user, db]);

            const activeSection = sections.find(s => s.id === activeSectionId);
            
            useEffect(() => {
                if (!isTypingRef.current && activeSection) {
                    setLocalText(activeSection.content || '');
                }
            }, [activeSectionId, activeSection?.content]);

            useEffect(() => {
                if (!isTypingRef.current) return;
                setSyncStatus('syncing');
                const timer = setTimeout(async () => {
                    if (!activeSectionId) return;
                    const sectionRef = window.FB.doc(db, 'artifacts', 'abnt-ufrj-alisson-v9', 'public', 'data', 'sections', activeSectionId);
                    await window.FB.updateDoc(sectionRef, { content: localText, updatedAt: Date.now() });
                    setSyncStatus('synced');
                    isTypingRef.current = false;
                }, 1000);
                return () => clearTimeout(timer);
            }, [localText]);

            // MOTOR DE PAGINAÇÃO: Calcula exatamente onde cada página começa
            const getCalculatedPages = () => {
                let globalPageCounter = 0; 
                let results = [];
                const titlePageIndex = sections.findIndex(s => s.type === 'title_page');

                sections.forEach((sec, idx) => {
                    const text = (sec.id === activeSectionId) ? localText : (sec.content || '');
                    const lines = text.split('\n');
                    
                    // Estimativa de quebra: aprox. 2800 caracteres por folha ou 35 linhas
                    const charsPerPage = 2800;
                    const pagesInSec = Math.max(1, Math.ceil(text.length / charsPerPage));
                    
                    // Contagem ABNT: Começa na Folha de Rosto (idx >= titlePageIndex)
                    if (idx >= titlePageIndex) {
                        globalPageCounter += 1; // Incrementa para a primeira página da secção
                    }

                    const sectionInfo = {
                        ...sec,
                        startPage: globalPageCounter,
                        numPages: pagesInSec,
                        text: text,
                        showNumber: sec.type === 'textual' || sec.type === 'references'
                    };
                    
                    results.push(sectionInfo);
                    
                    // Adiciona as páginas extras da mesma secção à contagem global
                    if (pagesInSec > 1 && idx >= titlePageIndex) {
                        globalPageCounter += (pagesInSec - 1);
                    }
                });
                return results;
            };

            const paginatedData = getCalculatedPages();
            const currentPaginated = paginatedData.find(p => p.id === activeSectionId);

            // Renderiza o conteúdo respeitando quebras de página reais
            const PageRenderer = ({ item, isPrint = false }) => {
                const lines = item.text.split('\n');
                const charsPerPage = 2800;
                
                // Divide o texto em blocos de página
                let pageBlocks = [];
                for (let i = 0; i < item.numPages; i++) {
                    pageBlocks.push(item.text.substring(i * charsPerPage, (i + 1) * charsPerPage));
                }

                return (
                    <React.Fragment>
                        {pageBlocks.map((blockText, pIdx) => {
                            const currentPageNumber = item.startPage + pIdx;
                            const isFirstPageOfDoc = item.type === 'cover';
                            
                            return (
                                <div key={`${item.id}-${pIdx}`} className={isPrint ? 'abnt-page' : 'abnt-page-web'} style={{ fontFamily: fontFamily === 'Arial' ? 'Arial' : 'Times New Roman' }}>
                                    {/* Número da página (Sempre no canto superior direito se for textual) */}
                                    {item.showNumber && currentPageNumber > 0 && (
                                        <div className="absolute top-[2cm] right-[2cm] text-[10pt] font-normal no-print-helper">
                                            {currentPageNumber}
                                        </div>
                                    )}

                                    {/* Layout Especial para Capa e Folha de Rosto */}
                                    {(item.type === 'cover' || item.type === 'title_page') && pIdx === 0 ? (
                                        <div className="flex flex-col h-full text-center uppercase font-bold justify-between">
                                            <div className="space-y-1">{lines.slice(0, 3).map((l, i) => <div key={i}>{l}</div>)}</div>
                                            <div className="flex-1 flex flex-col justify-center gap-10">
                                                {lines.slice(3, -2).map((l, i) => <div key={i} className={l.length > 40 ? "text-lg" : "text-xl"}>{l}</div>)}
                                            </div>
                                            <div className="space-y-1">{lines.slice(-2).map((l, i) => <div key={i}>{l}</div>)}</div>
                                        </div>
                                    ) : (
                                        <div className="w-full">
                                            {pIdx === 0 && <h2 className="text-center font-bold uppercase mb-12 text-[12pt]">{item.title}</h2>}
                                            <div className="whitespace-pre-wrap text-justify leading-[1.5] text-[12pt]">
                                                {blockText.split('\n').map((line, lIdx) => (
                                                    <p key={lIdx} className="mb-4" style={{ textIndent: (item.type === 'references' || line.trim() === "") ? '0' : '1.25cm' }}>
                                                        {line}
                                                    </p>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </React.Fragment>
                );
            };

            const handleExport = (all) => {
                setIsExportingAll(all);
                setTimeout(() => window.print(), 600);
            };

            if (authStatus === 'loading') return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black animate-pulse">Sincronizando Paginação ABNT...</div>;

            return (
                <div id="ui-root">
                    {/* PORTAL DE PDF (Apenas para Impressão) */}
                    <div id="print-portal" className="hidden">
                        {isExportingAll ? paginatedData.map(p => <PageRenderer key={p.id} item={p} isPrint={true} />) : (currentPaginated && <PageRenderer item={currentPaginated} isPrint={true} />)}
                    </div>

                    {/* INTERFACE DO ALISSON */}
                    <div className="flex h-screen overflow-hidden bg-slate-200 print-hidden">
                        <aside className="w-80 bg-slate-900 text-white flex flex-col shadow-2xl z-30">
                            <div className="p-6 bg-slate-950 border-b border-slate-800 flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl shadow-lg"><i data-lucide="book-marked" className="w-5 h-5"></i></div>
                                <div><h1 className="font-black italic uppercase tracking-tighter text-lg leading-none">Lex ABNT</h1><p className="text-[8px] text-slate-500 font-bold uppercase mt-1">UFRJ Edition v9</p></div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-1 custom-scroll">
                                {paginatedData.map(s => (
                                    <button key={s.id} onClick={() => { setActiveSectionId(s.id); activeIdRef.current = s.id; isTypingRef.current = false; }} className={`w-full text-left p-4 rounded-2xl text-[11px] font-bold uppercase transition-all flex justify-between items-center group ${activeSectionId === s.id ? 'bg-blue-600 text-white shadow-xl translate-x-1' : 'hover:bg-slate-800 text-slate-400'}`}>
                                        <span className="truncate">{s.title}</span>
                                        {s.startPage > 0 && <span className={`text-[9px] px-2 py-0.5 rounded-full ${activeSectionId === s.id ? 'bg-blue-500 border border-white/20' : 'bg-slate-950'}`}>P.{s.startPage}</span>}
                                    </button>
                                ))}
                            </div>
                        </aside>

                        <main className="flex-1 flex flex-col min-w-0">
                            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-20">
                                <div className="flex bg-slate-100 p-1 rounded-xl gap-1 border border-slate-200">
                                    <button onClick={() => setViewMode('edit')} className={`px-6 py-2 rounded-lg text-[10px] font-black transition-all ${viewMode === 'edit' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>ESCREVER</button>
                                    <button onClick={() => setViewMode('preview')} className={`px-6 py-2 rounded-lg text-[10px] font-black transition-all ${viewMode === 'preview' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>VER FOLHAS</button>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full border ${syncStatus === 'syncing' ? 'bg-orange-50 text-orange-600 border-orange-200' : 'bg-green-50 text-green-600 border-green-200'} text-[9px] font-black`}>
                                        {syncStatus === 'syncing' ? <i data-lucide="refresh-cw" className="w-3 h-3 animate-spin"></i> : <i data-lucide="check" className="w-3 h-3"></i>}
                                        <span>{syncStatus === 'syncing' ? 'SALVANDO...' : 'TRABALHO GUARDADO'}</span>
                                    </div>
                                    <button onClick={() => handleExport(false)} className="bg-slate-800 text-white px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase hover:bg-black transition-all flex items-center gap-2 shadow-md"><i data-lucide="printer" className="w-4 h-4"></i> SEÇÃO</button>
                                    <button onClick={() => handleExport(true)} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase hover:bg-blue-700 shadow-lg flex items-center gap-2 border border-blue-500 active:scale-95"><i data-lucide="file-check" className="w-4 h-4"></i> PDF COMPLETO</button>
                                </div>
                            </header>

                            <div className="flex-1 overflow-y-auto p-12 flex flex-col items-center custom-scroll bg-slate-50">
                                {viewMode === 'edit' ? (
                                    <div className="w-full max-w-4xl flex flex-col bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
                                        <div className="px-10 py-6 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                            <h2 className="text-[13px] font-black text-slate-800 uppercase tracking-tight">{activeSection?.title}</h2>
                                            <select value={fontFamily} onChange={e => setFontFamily(e.target.value)} className="text-[10px] font-black bg-white border border-slate-200 rounded-lg px-4 py-2 shadow-sm cursor-pointer">
                                                <option value="Arial">ARIAL</option>
                                                <option value="Times">TIMES NEW ROMAN</option>
                                            </select>
                                        </div>
                                        <textarea className="flex-1 p-16 focus:outline-none resize-none text-[12pt] leading-[1.5] text-slate-800 min-h-[700px] selection:bg-blue-100" style={{ fontFamily: fontFamily === 'Arial' ? 'Arial, sans-serif' : '"Times New Roman", serif' }} value={localText} onChange={(e) => { isTypingRef.current = true; setLocalText(e.target.value); }} />
                                    </div>
                                ) : (
                                    <div className="scale-90 origin-top pb-20">
                                        {currentPaginated && <PageRenderer item={currentPaginated} isPrint={false} />}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
