<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex ABNT - Alisson Pro Edition v11</title>
    
    <!-- Bibliotecas via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxSDZ3J_Q9sdVkC9S7wYmqSbTjatxLab0",
            authDomain: "formatador-abnt-multiusuarios.firebaseapp.com",
            projectId: "formatador-abnt-multiusuarios",
            storageBucket: "formatador-abnt-multiusuarios.firebasestorage.app",
            messagingSenderId: "939976247624",
            appId: "1:939976247624:web:d142f11e531234507a0b7d"
        };

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch, firebaseConfig };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* --- CONFIGURAÇÃO DE IMPRESSÃO INFALÍVEL --- */
        @media print {
            @page { 
                size: A4; 
                margin: 0; 
            }
            
            html, body { 
                background: white !important; 
                height: auto !important;
                overflow: visible !important;
            }
            
            #root { 
                display: none !important; 
            }

            #print-container { 
                display: block !important; 
                width: 210mm !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
            }

            /* Cada página física é forçada aqui */
            .abnt-page-print { 
                display: block !important;
                width: 210mm !important;
                height: 297mm !important; /* Altura fixa para garantir que o número fique no lugar certo */
                padding: 3cm 2cm 2cm 3cm !important;
                box-sizing: border-box !important;
                background: white !important;
                position: relative !important;
                page-break-after: always !important;
                break-after: page !important;
                overflow: hidden !important; /* Impede que o texto "vaze" para uma página sem número */
                color: black !important;
            }

            div[class*="grammarly"], grammarly-extension, [data-grammarly-part], 
            div[style*="z-index: 2147483647"], .no-print, [class*="assistant"] { 
                display: none !important; 
            }
        }
        
        /* Estilo da folha no ecrã */
        .abnt-page-screen {
            width: 21cm;
            min-height: 29.7cm;
            padding: 3cm 2cm 2cm 3cm;
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin: 20px auto;
            position: relative;
            box-sizing: border-box;
            color: black;
            overflow: hidden;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body>
    <div id="print-container" style="display: none;"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MANDATORY_SECTIONS = [
            { title: 'Capa', content: 'UNIVERSIDADE FEDERAL DO RIO DE JANEIRO\nCENTRO DE CIÊNCIAS JURÍDICAS E ECONÔMICAS\nFACULDADE DE DIREITO\n\n\nALISSON CAMBUI DA SILVA\n\n\nINIMPUTABILIDADE PENAL: OS ASPECTOS LEGAIS RELATIVOS AO ACUSADO PORTADOR DE SOFRIMENTO PSÍQUICO\n\n\nRio de Janeiro\n2026', type: 'cover', order: 0 },
            { title: 'Folha de Rosto', content: 'ALISSON CAMBUI DA SILVA\n\n\nINIMPUTABILIDADE PENAL: OS ASPECTOS LEGAIS RELATIVOS AO ACUSADO PORTADOR DE SOFRIMENTO PSÍQUICO\n\n\nMonografia de final de curso apresentada à Faculdade de Direito da UFRJ.\n\nRio de Janeiro\n2026', type: 'title_page', order: 1 },
            { title: 'Resumo', content: 'Escreva aqui o seu resumo...', type: 'pre-textual', order: 2 },
            { title: 'Sumário', content: 'INTRODUÇÃO\n1. DESENVOLVIMENTO\nCONCLUSÃO\nREFERÊNCIAS', type: 'pre-textual', order: 3 },
            { title: 'Introdução', content: 'O presente trabalho...', type: 'textual', order: 4 },
            { title: 'Desenvolvimento', content: 'Inicie o seu desenvolvimento aqui. O sistema agora divide o texto em blocos menores para garantir que todas as páginas sejam numeradas corretamente conforme a norma NBR 14724.', type: 'textual', order: 5 },
            { title: 'Conclusão', content: 'Portanto...', type: 'textual', order: 6 },
            { title: 'Referências Bibliográficas', content: 'SOBRENOME, Nome. Título. Cidade: Editora, Ano.', type: 'references', order: 7 },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [authStatus, setAuthStatus] = useState('loading');
            const [sections, setSections] = useState([]);
            const [activeSectionId, setActiveSectionId] = useState(null);
            const [localText, setLocalText] = useState('');
            const [viewMode, setViewMode] = useState('edit');
            const [syncStatus, setSyncStatus] = useState('synced');
            const [fontFamily, setFontFamily] = useState('Arial');
            const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);

            const isTypingRef = useRef(false);
            const activeIdRef = useRef(null);

            useEffect(() => { if (window.lucide) lucide.createIcons(); });

            useEffect(() => {
                const initFirebase = async () => {
                    if (window.FB) {
                        const app = window.FB.initializeApp(window.FB.firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        try { await window.FB.signInAnonymously(auth); } catch (e) { setAuthStatus('error'); }
                        window.FB.onAuthStateChanged(auth, (u) => { if (u) { setUser(u); setAuthStatus('authenticated'); } });
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const appId = 'abnt-ufrj-alisson-v11';
                const sectionsRef = window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'sections');

                const unsub = window.FB.onSnapshot(sectionsRef, (snap) => {
                    if (snap.empty) {
                        const batch = window.FB.writeBatch(db);
                        MANDATORY_SECTIONS.forEach(sec => {
                            const newDoc = window.FB.doc(sectionsRef);
                            batch.set(newDoc, { ...sec, createdAt: Date.now(), lastEditedBy: user.uid });
                        });
                        batch.commit();
                    } else {
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => a.order - b.order);
                        setSections(docs);
                        if (!activeIdRef.current && docs.length > 0) {
                            setActiveSectionId(docs[0].id);
                            activeIdRef.current = docs[0].id;
                        }
                    }
                });
                return () => unsub();
            }, [user, db]);

            const activeSection = sections.find(s => s.id === activeSectionId);
            
            useEffect(() => {
                if (!isTypingRef.current && activeSection) {
                    setLocalText(activeSection.content || '');
                }
            }, [activeSectionId, activeSection?.content]);

            useEffect(() => {
                if (!isTypingRef.current) return;
                setSyncStatus('syncing');
                const timer = setTimeout(async () => {
                    if (!activeSectionId) return;
                    const sectionRef = window.FB.doc(db, 'artifacts', 'abnt-ufrj-alisson-v11', 'public', 'data', 'sections', activeSectionId);
                    await window.FB.updateDoc(sectionRef, { content: localText, updatedAt: Date.now() });
                    setSyncStatus('synced');
                    isTypingRef.current = false;
                }, 1000);
                return () => clearTimeout(timer);
            }, [localText]);

            // MOTOR DE PAGINAÇÃO V11: Split rigoroso para garantir numeração
            const getPages = () => {
                let globalPageCounter = 0; 
                let allPages = [];
                const titlePageIndex = sections.findIndex(s => s.type === 'title_page');

                sections.forEach((sec, idx) => {
                    const text = (sec.id === activeSectionId) ? localText : (sec.content || '');
                    
                    // ABNT RIGOROSA: 2200 caracteres é o limite seguro para 1.5 de entrelinha em A4
                    const charsPerPage = 2200; 
                    const pagesCount = Math.max(1, Math.ceil(text.length / charsPerPage));
                    
                    // Contagem começa na Folha de Rosto (é a página 1, mas não mostra o número)
                    if (idx >= titlePageIndex) globalPageCounter++;

                    for (let p = 0; p < pagesCount; p++) {
                        const block = text.substring(p * charsPerPage, (p + 1) * charsPerPage);
                        allPages.push({
                            id: `${sec.id}-${p}`,
                            sectionId: sec.id,
                            title: sec.title,
                            type: sec.type,
                            content: block,
                            pageNumber: globalPageCounter,
                            // Só mostra número a partir da Introdução (index 4 ou tipo textual)
                            showNumber: (sec.type === 'textual' || sec.type === 'references'),
                            isFirstOfSection: p === 0
                        });
                        
                        // Incrementa o contador global para cada sub-página gerada
                        if (p < pagesCount - 1 && idx >= titlePageIndex) {
                            globalPageCounter++;
                        }
                    }
                });
                return allPages;
            };

            const allPagesData = getPages();

            const handleExport = (exportAll = true) => {
                setIsGeneratingPdf(true);
                const printContainer = document.getElementById('print-container');
                printContainer.innerHTML = ''; 
                
                const pagesToPrint = exportAll 
                    ? allPagesData 
                    : allPagesData.filter(p => p.sectionId === activeSectionId);

                pagesToPrint.forEach(page => {
                    const div = document.createElement('div');
                    div.className = 'abnt-page-print';
                    div.style.fontFamily = fontFamily === 'Arial' ? 'Arial' : 'Times New Roman';
                    
                    // Número da página (Canto superior direito)
                    if (page.showNumber) {
                        const numDiv = document.createElement('div');
                        numDiv.style.position = 'absolute';
                        numDiv.style.top = '2cm';
                        numDiv.style.right = '2cm';
                        numDiv.style.fontSize = '10pt';
                        numDiv.innerText = page.pageNumber;
                        div.appendChild(numDiv);
                    }

                    // Título da Secção (Apenas no topo da primeira página daquela secção)
                    if (page.isFirstOfSection && page.type !== 'cover' && page.type !== 'title_page') {
                        const h2 = document.createElement('h2');
                        h2.style.textAlign = 'center';
                        h2.style.fontWeight = 'bold';
                        h2.style.textTransform = 'uppercase';
                        h2.style.marginBottom = '1.5cm';
                        h2.style.fontSize = '12pt';
                        h2.innerText = page.title;
                        div.appendChild(h2);
                    }

                    const contentDiv = document.createElement('div');
                    contentDiv.style.whiteSpace = 'pre-wrap';
                    contentDiv.style.textAlign = 'justify';
                    contentDiv.style.lineHeight = '1.5';
                    contentDiv.style.fontSize = '12pt';

                    if (page.type === 'cover' || page.type === 'title_page') {
                        div.style.display = 'flex';
                        div.style.flexDirection = 'column';
                        div.style.justifyContent = 'space-between';
                        div.style.textAlign = 'center';
                        div.style.textTransform = 'uppercase';
                        div.style.fontWeight = 'bold';
                        
                        const lines = page.content.split('\n');
                        const header = lines.slice(0, 3).join('\n');
                        const footer = lines.slice(-2).join('\n');
                        const body = lines.slice(3, -2).join('\n');

                        contentDiv.innerHTML = `
                            <div style="margin-bottom: 2cm">${header}</div>
                            <div style="flex: 1; display: flex; align-items: center; justify-content: center; font-size: 14pt;">${body}</div>
                            <div style="margin-top: auto">${footer}</div>
                        `;
                    } else {
                        const paras = page.content.split('\n').map(line => {
                            if (line.trim() === '') return '<br/>';
                            const indent = page.type === 'references' ? '0' : '1.25cm';
                            return `<p style="text-indent: ${indent}; margin-bottom: 0.4cm">${line}</p>`;
                        }).join('');
                        contentDiv.innerHTML = paras;
                    }

                    div.appendChild(contentDiv);
                    printContainer.appendChild(div);
                });

                setTimeout(() => {
                    setIsGeneratingPdf(false);
                    window.print();
                }, 1000);
            };

            if (authStatus === 'loading') return <div className="h-screen flex items-center justify-center bg-slate-950 text-white font-black animate-pulse uppercase tracking-tighter">Lex ABNT v11 - Sincronizando...</div>;

            return (
                <div id="ui-root">
                    {isGeneratingPdf && (
                        <div className="loading-overlay">
                            <div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                            <h2 className="font-black uppercase tracking-widest text-lg">Gerando PDF Perfeito</h2>
                            <p className="text-slate-400 text-sm mt-2">Garantindo a numeração de todas as páginas...</p>
                        </div>
                    )}

                    <div className="flex h-screen overflow-hidden print-hidden">
                        <aside className="w-80 bg-slate-900 text-white flex flex-col shadow-2xl z-30">
                            <div className="p-6 bg-slate-950 border-b border-slate-800 flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl shadow-lg"><i data-lucide="award" className="w-5 h-5"></i></div>
                                <div><h1 className="font-black italic uppercase tracking-tighter text-lg leading-none">Lex ABNT</h1><p className="text-[8px] text-slate-500 font-bold uppercase mt-1">Law Precision v11</p></div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-1 custom-scroll">
                                {sections.map(s => {
                                    const pageInfo = allPagesData.find(p => p.sectionId === s.id && p.isFirstOfSection);
                                    return (
                                        <button key={s.id} onClick={() => { setActiveSectionId(s.id); activeIdRef.current = s.id; isTypingRef.current = false; }} className={`w-full text-left p-4 rounded-2xl text-[11px] font-bold uppercase transition-all flex justify-between items-center group ${activeSectionId === s.id ? 'bg-blue-600 text-white shadow-xl translate-x-1' : 'hover:bg-slate-800 text-slate-400'}`}>
                                            <span className="truncate">{s.title}</span>
                                            {pageInfo?.pageNumber > 0 && <span className={`text-[9px] px-2 py-0.5 rounded-full ${activeSectionId === s.id ? 'bg-blue-500 border border-white/20' : 'bg-slate-950'}`}>P.{pageInfo.pageNumber}</span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </aside>

                        <main className="flex-1 flex flex-col min-w-0">
                            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-20">
                                <div className="flex bg-slate-100 p-1 rounded-xl gap-1 border border-slate-200">
                                    <button onClick={() => setViewMode('edit')} className={`px-6 py-2 rounded-lg text-[10px] font-black transition-all ${viewMode === 'edit' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}>ESCREVER</button>
                                    <button onClick={() => setViewMode('preview')} className={`px-6 py-2 rounded-lg text-[10px] font-black transition-all ${viewMode === 'preview' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}>VER FOLHAS</button>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full border ${syncStatus === 'syncing' ? 'bg-orange-50 text-orange-600 border-orange-200' : 'bg-green-50 text-green-600 border-green-200'} text-[9px] font-black`}>
                                        {syncStatus === 'syncing' ? <i data-lucide="refresh-cw" className="w-3 h-3 animate-spin"></i> : <i data-lucide="check" className="w-3 h-3"></i>}
                                        <span>{syncStatus === 'syncing' ? 'A GUARDAR...' : 'SINCRONIZADO'}</span>
                                    </div>
                                    <button onClick={() => handleExport(false)} className="bg-slate-800 text-white px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase hover:bg-black transition-all flex items-center gap-2 shadow-md"><i data-lucide="printer" className="w-4 h-4"></i> SEÇÃO</button>
                                    <button onClick={() => handleExport(true)} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase hover:bg-blue-700 shadow-lg flex items-center gap-2 border border-blue-500 active:scale-95"><i data-lucide="file-check" className="w-4 h-4"></i> PDF COMPLETO</button>
                                </div>
                            </header>

                            <div className="flex-1 overflow-y-auto p-12 flex flex-col items-center custom-scroll bg-slate-50">
                                {viewMode === 'edit' ? (
                                    <div className="w-full max-w-4xl flex flex-col bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
                                        <div className="px-10 py-6 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                            <h2 className="text-[13px] font-black text-slate-800 uppercase tracking-tight">{activeSection?.title}</h2>
                                            <select value={fontFamily} onChange={e => setFontFamily(e.target.value)} className="text-[10px] font-black bg-white border border-slate-200 rounded-lg px-4 py-2 shadow-sm cursor-pointer outline-none">
                                                <option value="Arial">ARIAL (PADRÃO)</option>
                                                <option value="Times">TIMES NEW ROMAN</option>
                                            </select>
                                        </div>
                                        <textarea className="flex-1 p-16 focus:outline-none resize-none text-[12pt] leading-[1.5] text-slate-800 min-h-[700px] selection:bg-blue-100" style={{ fontFamily: fontFamily === 'Arial' ? 'Arial, sans-serif' : '"Times New Roman", serif' }} value={localText} onChange={(e) => { isTypingRef.current = true; setLocalText(e.target.value); }} />
                                    </div>
                                ) : (
                                    <div className="scale-90 origin-top pb-20">
                                        {allPagesData.filter(p => p.sectionId === activeSectionId).map(p => (
                                            <div key={p.id} className="abnt-page-screen" style={{ fontFamily: fontFamily === 'Arial' ? 'Arial' : 'Times New Roman' }}>
                                                {p.showNumber && <div className="absolute top-[2cm] right-[2cm] font-normal text-sm">{p.pageNumber}</div>}
                                                {p.isFirstOfSection && p.type !== 'cover' && p.type !== 'title_page' && <h2 className="text-center font-bold uppercase mb-12 text-[12pt]">{p.title}</h2>}
                                                <div className="whitespace-pre-wrap text-justify leading-[1.5] text-[12pt]">
                                                    {p.content.split('\n').map((line, lIdx) => (
                                                        <p key={lIdx} className="mb-4" style={{ textIndent: (p.type === 'references' || line.trim() === "") ? '0' : '1.25cm' }}>
                                                            {line}
                                                        </p>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
