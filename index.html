<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex ABNT - Alisson Edition</title>
    
    <!-- Bibliotecas Necessárias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // CONFIGURAÇÃO DO ALISSON
        const firebaseConfig = {
            apiKey: "AIzaSyDxSDZ3J_Q9sdVkC9S7wYmqSbTjatxLab0",
            authDomain: "formatador-abnt-multiusuarios.firebaseapp.com",
            projectId: "formatador-abnt-multiusuarios",
            storageBucket: "formatador-abnt-multiusuarios.firebasestorage.app",
            messagingSenderId: "939976247624",
            appId: "1:939976247624:web:d142f11e531234507a0b7d"
        };

        // Disponibiliza as funções do Firebase para o React
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch, firebaseConfig };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        @media print {
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible; }
            #print-container { 
                display: block !important; 
                position: absolute !important; 
                left: 0 !important; 
                top: 0 !important; 
                width: 100% !important;
            }
            .print-page-break { page-break-after: always !important; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MANDATORY_SECTIONS = [
            { title: 'Capa', content: 'UNIVERSIDADE FEDERAL DO RIO DE JANEIRO\nCENTRO DE CIÊNCIAS JURÍDICAS E ECONÔMICAS\nFACULDADE DE DIREITO\n\n\n[TÍTULO DO TRABALHO]\n\n\n[NOME DO AUTOR]\n\n\nRio de Janeiro\n2024', type: 'cover', order: 0 },
            { title: 'Folha de Rosto', content: '[NOME DO AUTOR]\n\n[TÍTULO DO TRABALHO]\n\nMonografia de final de curso...', type: 'title_page', order: 1 },
            { title: 'Resumo', content: 'Este estudo tem o objetivo de abordar...', type: 'pre-textual', order: 2 },
            { title: 'Sumário', content: '1. INTRODUÇÃO\n2. DESENVOLVIMENTO...', type: 'pre-textual', order: 3 },
            { title: 'Introdução', content: 'No atual ordenamento jurídico brasileiro...', type: 'textual', order: 4 },
            { title: 'Desenvolvimento', content: '1. CONCEITO DE CRIME\n\nEmbora o conceito de crime seja o alicerce...', type: 'textual', order: 5 },
            { title: 'Conclusão', content: 'Diante do trabalho apresentado, nota-se...', type: 'textual', order: 6 },
            { title: 'Referências Bibliográficas', content: 'AMARANTE, Paulo. Loucos pela Vida. Rio de Janeiro: FIOCRUZ, 2013.', type: 'references', order: 7 },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [authStatus, setAuthStatus] = useState('loading');
            const [sections, setSections] = useState([]);
            const [materials, setMaterials] = useState([]);
            const [activeSectionId, setActiveSectionId] = useState(null);
            const [localText, setLocalText] = useState('');
            const [viewMode, setViewMode] = useState('edit');
            const [syncStatus, setSyncStatus] = useState('synced');
            const [isExportingAll, setIsExportingAll] = useState(false);

            const isTypingRef = useRef(false);
            const activeIdRef = useRef(null);

            // Inicialização do Firebase
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.FB) {
                        clearInterval(interval);
                        const app = window.FB.initializeApp(window.FB.firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);

                        window.FB.signInAnonymously(auth).catch(() => setAuthStatus('error'));
                        window.FB.onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setAuthStatus('authenticated');
                            }
                        });
                    }
                }, 100);
            }, []);

            // Sincronização de Dados
            useEffect(() => {
                if (!user || !db) return;
                const appId = 'abnt-ufrj-alisson-final';
                const sectionsRef = window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'sections');
                const materialsRef = window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'materials');

                // Setup inicial se vazio
                window.FB.getDocs(sectionsRef).then(snap => {
                    if (snap.empty) {
                        const batch = window.FB.writeBatch(db);
                        MANDATORY_SECTIONS.forEach(sec => {
                            const newDoc = window.FB.doc(sectionsRef);
                            batch.set(newDoc, { ...sec, createdAt: Date.now(), lastEditedBy: user.uid });
                        });
                        batch.commit();
                    }
                });

                const unsubSec = window.FB.onSnapshot(sectionsRef, (snap) => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => a.order - b.order);
                    setSections(docs);
                    if (!activeIdRef.current && docs.length > 0) {
                        setActiveSectionId(docs[0].id);
                        activeIdRef.current = docs[0].id;
                    }
                });

                const unsubMat = window.FB.onSnapshot(materialsRef, (snap) => {
                    setMaterials(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubSec(); unsubMat(); };
            }, [user, db]);

            // Controle do Texto Local (Evita Saltos)
            const activeSection = sections.find(s => s.id === activeSectionId);
            useEffect(() => {
                if (!isTypingRef.current && activeSection) {
                    setLocalText(activeSection.content || '');
                }
            }, [activeSectionId, activeSection?.content]);

            useEffect(() => {
                if (!isTypingRef.current) return;
                setSyncStatus('syncing');
                const timer = setTimeout(async () => {
                    const sectionRef = window.FB.doc(db, 'artifacts', 'abnt-ufrj-alisson-final', 'public', 'data', 'sections', activeSectionId);
                    await window.FB.updateDoc(sectionRef, { content: localText, updatedAt: Date.now() });
                    setSyncStatus('synced');
                    isTypingRef.current = false;
                }, 1000);
                return () => clearTimeout(timer);
            }, [localText]);

            const calculatePagination = () => {
                let counter = 1;
                const startIndex = sections.findIndex(s => s.type === 'title_page');
                return sections.map((s, i) => {
                    if (i < startIndex) return { ...s, page: 0, visible: false };
                    const text = s.id === activeSectionId ? localText : (s.content || '');
                    const pages = Math.max(1, Math.ceil(text.length / 2800));
                    const res = { ...s, page: counter, visible: s.type === 'textual' || s.type === 'references' };
                    counter += pages;
                    return res;
                });
            };

            const paginated = calculatePagination();

            const renderContent = (sec, isPrint = false) => {
                const text = (sec.id === activeSectionId && !isExportingAll) ? localText : (sec.content || '');
                const lines = text.split('\n');
                const pInfo = paginated.find(p => p.id === sec.id);

                return (
                    <div key={sec.id} className={`bg-white text-black p-[3cm_2cm_2cm_3cm] relative shadow-lg mb-8 ${isPrint ? 'print-page-break shadow-none mb-0' : ''}`} style={{ width: '21cm', minHeight: '29.7cm', fontSize: '12pt', lineHeight: '1.5' }}>
                        {pInfo?.visible && <div className="absolute top-[2cm] right-[2cm]">{pInfo.page}</div>}
                        {sec.type === 'cover' || sec.type === 'title_page' ? (
                            <div className="flex flex-col h-[23cm] text-center uppercase font-bold justify-between">
                                <div>{lines.slice(0, 3).join('\n')}</div>
                                <div className="text-xl">{lines.find(l => l.includes('[TÍTULO')) || 'TÍTULO'}</div>
                                <div>{lines.find(l => l.includes('[NOME')) || 'AUTOR'}</div>
                                <div>{lines.slice(-2).join('\n')}</div>
                            </div>
                        ) : (
                            <div>
                                <h2 className="text-center font-bold uppercase mb-12">{sec.title}</h2>
                                {lines.map((l, idx) => <p key={idx} className="mb-4 text-justify" style={{ textIndent: sec.type === 'references' ? '0' : '1.25cm' }}>{l}</p>)}
                            </div>
                        )}
                    </div>
                );
            };

            if (authStatus === 'loading') return <div className="h-screen flex items-center justify-center text-slate-500 font-bold uppercase tracking-widest animate-pulse">A carregar Lex ABNT...</div>;
            if (authStatus === 'error') return <div class="p-20 text-center"><h1>Ative o modo Anónimo no Firebase</h1></div>;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Área de Impressão PDF */}
                    <div id="print-container" className="hidden print:block">
                        {isExportingAll ? paginated.map(s => renderContent(s, true)) : (activeSection && renderContent(activeSection, true))}
                    </div>

                    {/* Sidebar */}
                    <aside className="w-80 bg-slate-900 text-white flex flex-col shadow-2xl print:hidden">
                        <div className="p-6 border-b border-slate-800 bg-slate-950 flex items-center gap-3">
                            <i data-lucide="book-open" class="text-blue-500"></i>
                            <div>
                                <h1 className="font-black italic uppercase">Lex ABNT</h1>
                                <p className="text-[8px] text-slate-500 font-bold tracking-widest">Colaborativo HTML</p>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-1 custom-scroll">
                            {paginated.map(s => (
                                <button 
                                    key={s.id} 
                                    onClick={() => { setActiveSectionId(s.id); activeIdRef.current = s.id; isTypingRef.current = false; }}
                                    className={`w-full text-left p-3 rounded text-[11px] font-bold uppercase transition-all flex justify-between items-center ${activeSectionId === s.id ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800 text-slate-400'}`}
                                >
                                    <span className="truncate">{s.title}</span>
                                    {s.page > 0 && <span className="text-[9px] opacity-40">p.{s.page}</span>}
                                </button>
                            ))}
                        </div>
                    </aside>

                    {/* Editor */}
                    <main className="flex-1 flex flex-col bg-slate-50 print:hidden">
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm">
                            <div className="flex bg-slate-100 p-1 rounded-lg gap-1 border">
                                <button onClick={() => setViewMode('edit')} className={`px-4 py-1.5 rounded text-[10px] font-black tracking-widest ${viewMode === 'edit' ? 'bg-white shadow text-blue-600' : 'text-slate-400'}`}>ESCREVER</button>
                                <button onClick={() => setViewMode('preview')} className={`px-4 py-1.5 rounded text-[10px] font-black tracking-widest ${viewMode === 'preview' ? 'bg-white shadow text-blue-600' : 'text-slate-400'}`}>PRÉVIA</button>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className={`text-[9px] font-bold ${syncStatus === 'syncing' ? 'text-orange-500' : 'text-emerald-600'}`}>
                                    {syncStatus === 'syncing' ? 'A GUARDAR...' : 'SINCRONIZADO'}
                                </div>
                                <button onClick={() => { setIsExportingAll(false); setTimeout(() => window.print(), 100); }} className="bg-slate-800 text-white px-4 py-2 rounded text-[10px] font-bold hover:bg-black">PDF SEÇÃO</button>
                                <button onClick={() => { setIsExportingAll(true); setTimeout(() => window.print(), 100); }} className="bg-blue-600 text-white px-4 py-2 rounded text-[10px] font-bold hover:bg-blue-700 shadow-md">PDF COMPLETO</button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-12 flex justify-center custom-scroll">
                            {viewMode === 'edit' ? (
                                <div className="w-full max-w-4xl flex flex-col bg-white rounded-2xl shadow-xl border overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b flex justify-between text-[11px] font-black text-slate-400 uppercase">
                                        <span>{activeSection?.title}</span>
                                        {paginated.find(p => p.id === activeSectionId)?.page > 0 && <span>Pág. {paginated.find(p => p.id === activeSectionId).page}</span>}
                                    </div>
                                    <textarea 
                                        className="flex-1 p-12 focus:outline-none resize-none text-[12pt] leading-[1.5] text-slate-800 min-h-[600px]" 
                                        value={localText} 
                                        onChange={(e) => { isTypingRef.current = true; setLocalText(e.target.value); }} 
                                        placeholder="Inicie a redação..."
                                    />
                                </div>
                            ) : (
                                <div className="scale-90 origin-top">
                                    {activeSection && renderContent(activeSection)}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Inicializa ícones Lucide
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
