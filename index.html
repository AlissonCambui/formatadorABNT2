<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex ABNT - Alisson Edition Pro v8</title>
    
    <!-- Bibliotecas Necessárias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxSDZ3J_Q9sdVkC9S7wYmqSbTjatxLab0",
            authDomain: "formatador-abnt-multiusuarios.firebaseapp.com",
            projectId: "formatador-abnt-multiusuarios",
            storageBucket: "formatador-abnt-multiusuarios.firebasestorage.app",
            messagingSenderId: "939976247624",
            appId: "1:939976247624:web:d142f11e531234507a0b7d"
        };

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch, firebaseConfig };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #e2e8f0; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* --- CORREÇÃO DE IMPRESSÃO (Remove símbolos de extensões e cortes) --- */
        @media print {
            @page { 
                size: A4; 
                margin: 0; 
            }
            
            /* Esconde TUDO, exceto o portal de impressão */
            body * { 
                visibility: hidden !important; 
            }
            
            #print-portal, #print-portal * { 
                visibility: visible !important; 
            }

            #print-portal { 
                display: block !important; 
                position: absolute !important; 
                top: 0 !important; 
                left: 0 !important; 
                width: 210mm !important; 
                background: white !important;
            }

            /* Esconde especificamente ícones de extensões (Grammarly, etc) */
            div[class*="grammarly"], 
            div[class*="assistant"],
            grammarly-extension,
            [data-grammarly-part],
            div[style*="z-index: 2147483647"],
            .no-print { 
                display: none !important; 
                visibility: hidden !important;
                opacity: 0 !important;
            }

            .page-break { 
                page-break-after: always !important; 
                break-after: page !important;
                display: block !important;
                width: 100% !important;
                min-height: 297mm !important; 
                height: auto !important;
                padding: 3cm 2cm 2cm 3cm !important;
                box-sizing: border-box !important;
                background: white !important;
                position: relative !important;
                overflow: visible !important;
            }
        }
        
        .abnt-page-view {
            width: 21cm;
            min-height: 29.7cm;
            height: auto;
            padding: 3cm 2cm 2cm 3cm;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin: 20px auto;
            position: relative;
            box-sizing: border-box;
            color: black;
            overflow: visible;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MANDATORY_SECTIONS = [
            { title: 'Capa', content: 'UNIVERSIDADE FEDERAL DO RIO DE JANEIRO\nCENTRO DE CIÊNCIAS JURÍDICAS E ECONÔMICAS\nFACULDADE DE DIREITO\n\n\nALISSON CAMBUI DA SILVA\n\n\nINIMPUTABILIDADE PENAL: OS ASPECTOS LEGAIS RELATIVOS AO ACUSADO PORTADOR DE SOFRIMENTO PSÍQUICO\n\n\nRio de Janeiro\n2026', type: 'cover', order: 0 },
            { title: 'Folha de Rosto', content: 'ALISSON CAMBUI DA SILVA\n\n\nINIMPUTABILIDADE PENAL: OS ASPECTOS LEGAIS RELATIVOS AO ACUSADO PORTADOR DE SOFRIMENTO PSÍQUICO\n\n\nMonografia de final de curso apresentada à Faculdade de Direito da UFRJ.\n\nRio de Janeiro\n2026', type: 'title_page', order: 1 },
            { title: 'Resumo', content: 'Resumo aqui...', type: 'pre-textual', order: 2 },
            { title: 'Sumário', content: 'INTRODUÇÃO\n1. DESENVOLVIMENTO\nCONCLUSÃO\nREFERÊNCIAS', type: 'pre-textual', order: 3 },
            { title: 'Introdução', content: 'O presente trabalho analisa...', type: 'textual', order: 4 },
            { title: 'Desenvolvimento', content: 'Digite o conteúdo extenso aqui. Se ultrapassar uma página, o sistema agora permite que o texto continue nas folhas seguintes sem cortes.', type: 'textual', order: 5 },
            { title: 'Conclusão', content: 'Em conclusão...', type: 'textual', order: 6 },
            { title: 'Referências Bibliográficas', content: 'AMARANTE, Paulo. Loucos pela Vida. Rio de Janeiro: Fiocruz, 2013.', type: 'references', order: 7 },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [authStatus, setAuthStatus] = useState('loading');
            const [sections, setSections] = useState([]);
            const [figures, setFigures] = useState([]);
            const [activeSectionId, setActiveSectionId] = useState(null);
            const [localText, setLocalText] = useState('');
            const [viewMode, setViewMode] = useState('edit');
            const [syncStatus, setSyncStatus] = useState('synced');
            const [isExportingAll, setIsExportingAll] = useState(false);
            const [fontFamily, setFontFamily] = useState('Arial');

            const isTypingRef = useRef(false);
            const activeIdRef = useRef(null);

            useEffect(() => { if (window.lucide) lucide.createIcons(); });

            useEffect(() => {
                const initFirebase = async () => {
                    if (window.FB) {
                        const app = window.FB.initializeApp(window.FB.firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        try { await window.FB.signInAnonymously(auth); } catch (e) { setAuthStatus('error'); }
                        window.FB.onAuthStateChanged(auth, (u) => { if (u) { setUser(u); setAuthStatus('authenticated'); } });
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const appId = 'abnt-ufrj-alisson-v8';
                const sectionsRef = window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'sections');
                const figuresRef = window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'figures');

                const unsubSec = window.FB.onSnapshot(sectionsRef, (snap) => {
                    if (snap.empty) {
                        const batch = window.FB.writeBatch(db);
                        MANDATORY_SECTIONS.forEach(sec => {
                            const newDoc = window.FB.doc(sectionsRef);
                            batch.set(newDoc, { ...sec, createdAt: Date.now(), lastEditedBy: user.uid });
                        });
                        batch.commit();
                    } else {
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => a.order - b.order);
                        setSections(docs);
                        if (!activeIdRef.current && docs.length > 0) { setActiveSectionId(docs[0].id); activeIdRef.current = docs[0].id; }
                    }
                });

                const unsubFig = window.FB.onSnapshot(figuresRef, (snap) => {
                    setFigures(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubSec(); unsubFig(); };
            }, [user, db]);

            const activeSection = sections.find(s => s.id === activeSectionId);
            
            useEffect(() => {
                if (!isTypingRef.current && activeSection) { setLocalText(activeSection.content || ''); }
            }, [activeSectionId, activeSection?.content]);

            useEffect(() => {
                if (!isTypingRef.current) return;
                setSyncStatus('syncing');
                const timer = setTimeout(async () => {
                    if (!activeSectionId) return;
                    const sectionRef = window.FB.doc(db, 'artifacts', 'abnt-ufrj-alisson-v8', 'public', 'data', 'sections', activeSectionId);
                    await window.FB.updateDoc(sectionRef, { content: localText, updatedAt: Date.now() });
                    setSyncStatus('synced');
                    isTypingRef.current = false;
                }, 1000);
                return () => clearTimeout(timer);
            }, [localText]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async () => {
                    const base64 = reader.result;
                    const name = file.name.split('.')[0];
                    const figuresRef = window.FB.collection(db, 'artifacts', 'abnt-ufrj-alisson-v8', 'public', 'data', 'figures');
                    await window.FB.addDoc(figuresRef, { name, url: base64, source: 'Próprio autor (2026)' });
                };
                reader.readAsDataURL(file);
            };

            const calculatePagination = () => {
                let counter = 1;
                const startIndex = sections.findIndex(s => s.type === 'title_page');
                return sections.map((s, i) => {
                    if (i < startIndex) return { ...s, page: 0, visible: false };
                    const text = s.id === activeSectionId ? localText : (s.content || '');
                    const pages = Math.max(1, Math.ceil(text.length / 2800));
                    const res = { ...s, page: counter, visible: s.type === 'textual' || s.type === 'references' };
                    counter += pages;
                    return res;
                });
            };

            const paginated = calculatePagination();

            const PageRenderer = ({ sec, isPrint = false }) => {
                const text = (sec.id === activeSectionId && !isExportingAll) ? localText : (sec.content || '');
                const lines = text.split('\n');
                const pInfo = paginated.find(p => p.id === sec.id);

                const dynamicStyle = {
                    fontFamily: fontFamily === 'Arial' ? 'Arial, sans-serif' : '"Times New Roman", serif',
                };

                const parseLine = (line, idx) => {
                    const figMatch = line.match(/\[FIGURA:\s*(.*?)\]/);
                    if (figMatch) {
                        const figName = figMatch[1].trim();
                        const figure = figures.find(f => f.name.toLowerCase() === figName.toLowerCase());
                        if (figure) {
                            return (
                                <div key={idx} className="my-8 text-center no-indent" style={{ textIndent: 0, breakInside: 'avoid' }}>
                                    <p className="text-[10pt] font-bold uppercase mb-2">Figura – {figure.name}</p>
                                    <img src={figure.url} className="max-w-full mx-auto border border-slate-200 shadow-sm mb-2" />
                                    <p className="text-[10pt] italic">Fonte: {figure.source}</p>
                                </div>
                            );
                        }
                    }
                    return (
                        <p key={idx} className="mb-4 text-justify" style={{ textIndent: (sec.type === 'references' || line.trim() === "") ? '0' : '1.25cm' }}>
                            {line}
                        </p>
                    );
                };

                if (sec.type === 'cover' || sec.type === 'title_page') {
                    const header = lines.slice(0, 3);
                    const footer = lines.slice(-2);
                    const body = lines.slice(3, -2);
                    return (
                        <div className={isPrint ? 'page-break' : 'abnt-page-view'} style={dynamicStyle}>
                            <div className="flex flex-col h-full text-center uppercase font-bold justify-between min-h-[23.7cm]">
                                <div className="space-y-1">{header.map((l, i) => <div key={i}>{l}</div>)}</div>
                                <div className="flex-1 flex flex-col justify-center gap-8 py-10">
                                    {body.map((l, i) => <div key={i} className={l.length > 30 ? "text-xl" : "text-lg"}>{l}</div>)}
                                </div>
                                <div className="space-y-1">{footer.map((l, i) => <div key={i}>{l}</div>)}</div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className={isPrint ? 'page-break' : 'abnt-page-view'} style={dynamicStyle}>
                        {pInfo?.visible && <div className="absolute top-[2cm] right-[2cm] font-normal text-sm">{pInfo.page}</div>}
                        <h2 className="text-center font-bold uppercase mb-12 text-[12pt]">{sec.title}</h2>
                        <div className="whitespace-pre-wrap overflow-visible">
                            {lines.map((l, idx) => parseLine(l, idx))}
                        </div>
                    </div>
                );
            };

            const handleExport = (all) => {
                setIsExportingAll(all);
                setTimeout(() => { window.print(); }, 500);
            };

            if (authStatus === 'loading') return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black uppercase tracking-widest animate-pulse">Lex ABNT v8 - Limpando PDF...</div>;

            return (
                <div>
                    <div id="print-portal" className="hidden">
                        {isExportingAll ? sections.map(s => <PageRenderer key={s.id} sec={s} isPrint={true} />) : (activeSection && <PageRenderer sec={activeSection} isPrint={true} />)}
                    </div>

                    <div className="flex h-screen overflow-hidden print-hidden" id="ui-wrapper">
                        <aside className="w-80 bg-slate-900 text-white flex flex-col shadow-2xl z-30">
                            <div className="p-6 bg-slate-950 border-b border-slate-800 flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl"><i data-lucide="layout" className="w-5 h-5"></i></div>
                                <div><h1 className="font-black italic uppercase tracking-tighter text-lg leading-none">Lex ABNT</h1><p className="text-[8px] text-slate-500 font-bold uppercase mt-1">Exportação Limpa</p></div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto custom-scroll flex flex-col">
                                <div className="p-4 space-y-1">
                                    <p className="text-[10px] font-black text-slate-600 uppercase tracking-widest mb-4 px-2">Estrutura</p>
                                    {paginated.map(s => (
                                        <button key={s.id} onClick={() => { setActiveSectionId(s.id); activeIdRef.current = s.id; isTypingRef.current = false; }} className={`w-full text-left p-3 rounded-xl text-[11px] font-bold uppercase transition-all flex justify-between items-center group ${activeSectionId === s.id ? 'bg-blue-600 text-white shadow-lg translate-x-1' : 'hover:bg-slate-800 text-slate-400'}`}>
                                            <span className="truncate">{s.title}</span>
                                            {s.page > 0 && <span className={`text-[9px] px-2 py-0.5 rounded-full ${activeSectionId === s.id ? 'bg-blue-500 border border-white/20' : 'bg-slate-950'}`}>P.{s.page}</span>}
                                        </button>
                                    ))}
                                </div>

                                <div className="p-4 mt-auto bg-slate-950/50 border-t border-slate-800">
                                    <div className="flex items-center justify-between mb-4">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Figuras</p>
                                        <label className="cursor-pointer bg-blue-600 hover:bg-blue-500 p-1.5 rounded-lg shadow-lg">
                                            <i data-lucide="plus" className="w-3 h-3"></i>
                                            <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                                        </label>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        {figures.map(fig => (
                                            <div key={fig.id} className="relative group aspect-square bg-slate-800 rounded-lg overflow-hidden border border-slate-700">
                                                <img src={fig.url} className="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity" />
                                                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 bg-black/40">
                                                    <button onClick={() => { setLocalText(prev => prev + `\n[FIGURA: ${fig.name}]\n`); isTypingRef.current = true; }} className="bg-white text-black p-2 rounded-full shadow-xl"><i data-lucide="copy" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </aside>

                        <main className="flex-1 flex flex-col min-w-0">
                            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-20">
                                <div className="flex bg-slate-100 p-1 rounded-xl gap-1 border border-slate-200">
                                    <button onClick={() => setViewMode('edit')} className={`px-6 py-2 rounded-lg text-[10px] font-black tracking-widest transition-all ${viewMode === 'edit' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>ESCREVER</button>
                                    <button onClick={() => setViewMode('preview')} className={`px-6 py-2 rounded-lg text-[10px] font-black tracking-widest transition-all ${viewMode === 'preview' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>PRÉVIA</button>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full border ${syncStatus === 'syncing' ? 'bg-orange-50 text-orange-600 border-orange-200' : 'bg-green-50 text-green-600 border-green-200'} text-[9px] font-black`}>
                                        {syncStatus === 'syncing' ? <i data-lucide="rotate-cw" className="w-3 h-3 animate-spin"></i> : <i data-lucide="check-circle" className="w-3 h-3"></i>}
                                        <span>{syncStatus === 'syncing' ? 'GUARDANDO...' : 'SINCRONIZADO'}</span>
                                    </div>
                                    <button onClick={() => handleExport(false)} className="bg-slate-800 text-white px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-black transition-all flex items-center gap-2 shadow-md"><i data-lucide="printer" className="w-4 h-4"></i> SEÇÃO</button>
                                    <button onClick={() => handleExport(true)} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-blue-700 shadow-lg flex items-center gap-2 border border-blue-500 active:scale-95"><i data-lucide="file-text" className="w-4 h-4"></i> PDF COMPLETO</button>
                                </div>
                            </header>

                            <div className="flex-1 overflow-y-auto p-12 flex flex-col items-center custom-scroll bg-slate-50">
                                {viewMode === 'edit' ? (
                                    <div className="w-full max-w-4xl flex flex-col bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
                                        <div className="px-10 py-6 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                            <h2 className="text-[13px] font-black text-slate-800 uppercase tracking-tight">{activeSection?.title}</h2>
                                            <select value={fontFamily} onChange={e => setFontFamily(e.target.value)} className="text-[10px] font-black bg-white border border-slate-200 rounded-lg px-4 py-2 shadow-sm cursor-pointer">
                                                <option value="Arial">ARIAL (PADRÃO)</option>
                                                <option value="Times">TIMES NEW ROMAN</option>
                                            </select>
                                        </div>
                                        <textarea className="flex-1 p-16 focus:outline-none resize-none text-[12pt] leading-[1.5] text-slate-800 min-h-[700px] selection:bg-blue-100 overflow-visible" style={{ fontFamily: fontFamily === 'Arial' ? 'Arial, sans-serif' : '"Times New Roman", serif' }} value={localText} onChange={(e) => { isTypingRef.current = true; setLocalText(e.target.value); }} />
                                    </div>
                                ) : (
                                    <div className="scale-90 origin-top pb-20 overflow-visible"><PageRenderer sec={activeSection} isPrint={false} /></div>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
