<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex ABNT - Alisson Pro Edition v12</title>
    
    <!-- Bibliotecas via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxSDZ3J_Q9sdVkC9S7wYmqSbTjatxLab0",
            authDomain: "formatador-abnt-multiusuarios.firebaseapp.com",
            projectId: "formatador-abnt-multiusuarios",
            storageBucket: "formatador-abnt-multiusuarios.firebasestorage.app",
            messagingSenderId: "939976247624",
            appId: "1:939976247624:web:d142f11e531234507a0b7d"
        };

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, onSnapshot, query, updateDoc, addDoc, deleteDoc, getDocs, writeBatch, firebaseConfig };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* --- CONFIGURAÇÃO DE IMPRESSÃO INFALÍVEL --- */
        @media print {
            @page { size: A4; margin: 0; }
            html, body { background: white !important; height: auto !important; overflow: visible !important; }
            #root { display: none !important; }
            #print-container { display: block !important; width: 210mm !important; margin: 0 !important; background: white !important; }

            .abnt-page-print { 
                display: flex !important;
                flex-direction: column;
                width: 210mm !important;
                height: 297mm !important;
                padding: 3cm 2cm 2cm 3cm !important;
                box-sizing: border-box !important;
                background: white !important;
                position: relative !important;
                page-break-after: always !important;
                break-after: page !important;
                color: black !important;
            }

            .no-print { display: none !important; }
        }
        
        .abnt-page-screen {
            width: 21cm;
            height: 29.7cm;
            padding: 3cm 2cm 2cm 3cm;
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin: 20px auto;
            position: relative;
            box-sizing: border-box;
            color: black;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div id="print-container" style="display: none;"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MANDATORY_SECTIONS = [
            { title: 'Capa', content: 'UNIVERSIDADE FEDERAL DO RIO DE JANEIRO\nFACULDADE DE DIREITO\n\nALISSON CAMBUI DA SILVA\n\nINIMPUTABILIDADE PENAL: OS ASPECTOS LEGAIS RELATIVOS AO ACUSADO PORTADOR DE SOFRIMENTO PSÍQUICO\n\nRio de Janeiro\n2026', type: 'cover', order: 0 },
            { title: 'Folha de Rosto', content: 'ALISSON CAMBUI DA SILVA\n\nINIMPUTABILIDADE PENAL: OS ASPECTOS LEGAIS RELATIVOS AO ACUSADO PORTADOR DE SOFRIMENTO PSÍQUICO\n\nMonografia apresentada à Faculdade de Direito da Universidade Federal do Rio de Janeiro como requisito para obtenção do grau de Bacharel em Direito.\n\nOrientador: Prof. Ms. Hamilton Gonçalves Ferraz\n\nRio de Janeiro\n2026', type: 'title_page', order: 1 },
            { title: 'Resumo', content: 'Escreva o seu resumo aqui...', type: 'pre-textual', order: 2 },
            { title: 'Sumário', content: 'INTRODUÇÃO\n1. DESENVOLVIMENTO\nCONCLUSÃO\nREFERÊNCIAS', type: 'pre-textual', order: 3 },
            { title: 'Introdução', content: 'Texto inicial...', type: 'textual', order: 4 },
            { title: 'Desenvolvimento', content: 'Texto longo...', type: 'textual', order: 5 },
            { title: 'Conclusão', content: 'Conclusão...', type: 'textual', order: 6 },
            { title: 'Referências Bibliográficas', content: 'AMARANTE, Paulo. Loucos pela Vida. Rio de Janeiro: Fiocruz, 2013.', type: 'references', order: 7 },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [authStatus, setAuthStatus] = useState('loading');
            const [sections, setSections] = useState([]);
            const [activeSectionId, setActiveSectionId] = useState(null);
            const [localText, setLocalText] = useState('');
            const [viewMode, setViewMode] = useState('edit');
            const [syncStatus, setSyncStatus] = useState('synced');
            const [fontFamily, setFontFamily] = useState('Arial');
            const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);

            const isTypingRef = useRef(false);
            const activeIdRef = useRef(null);

            useEffect(() => { if (window.lucide) lucide.createIcons(); });

            useEffect(() => {
                const initFirebase = async () => {
                    if (window.FB) {
                        const app = window.FB.initializeApp(window.FB.firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        try { await window.FB.signInAnonymously(auth); } catch (e) { setAuthStatus('error'); }
                        window.FB.onAuthStateChanged(auth, (u) => { if (u) { setUser(u); setAuthStatus('authenticated'); } });
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const appId = 'abnt-ufrj-alisson-v12';
                const sectionsRef = window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'sections');

                const unsub = window.FB.onSnapshot(sectionsRef, (snap) => {
                    if (snap.empty) {
                        const batch = window.FB.writeBatch(db);
                        MANDATORY_SECTIONS.forEach(sec => {
                            const newDoc = window.FB.doc(sectionsRef);
                            batch.set(newDoc, { ...sec, createdAt: Date.now(), lastEditedBy: user.uid });
                        });
                        batch.commit();
                    } else {
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => a.order - b.order);
                        setSections(docs);
                        if (!activeIdRef.current && docs.length > 0) {
                            setActiveSectionId(docs[0].id);
                            activeIdRef.current = docs[0].id;
                        }
                    }
                });
                return () => unsub();
            }, [user, db]);

            const activeSection = sections.find(s => s.id === activeSectionId);
            
            useEffect(() => {
                if (!isTypingRef.current && activeSection) setLocalText(activeSection.content || '');
            }, [activeSectionId, activeSection?.content]);

            useEffect(() => {
                if (!isTypingRef.current) return;
                setSyncStatus('syncing');
                const timer = setTimeout(async () => {
                    if (!activeSectionId) return;
                    const sectionRef = window.FB.doc(db, 'artifacts', 'abnt-ufrj-alisson-v12', 'public', 'data', 'sections', activeSectionId);
                    await window.FB.updateDoc(sectionRef, { content: localText, updatedAt: Date.now() });
                    setSyncStatus('synced');
                    isTypingRef.current = false;
                }, 1000);
                return () => clearTimeout(timer);
            }, [localText]);

            const getPages = () => {
                let globalPageCounter = 0; 
                let allPages = [];
                const titlePageIndex = sections.findIndex(s => s.type === 'title_page');

                sections.forEach((sec, idx) => {
                    const text = (sec.id === activeSectionId) ? localText : (sec.content || '');
                    
                    if (sec.type === 'cover' || sec.type === 'title_page') {
                        if (idx >= titlePageIndex) globalPageCounter++;
                        allPages.push({ id: sec.id, sectionId: sec.id, type: sec.type, content: text, pageNumber: globalPageCounter, showNumber: false, isFirst: true, title: sec.title });
                    } else {
                        const charsPerPage = 2000; // Mais conservador para garantir numeração
                        const pagesCount = Math.max(1, Math.ceil(text.length / charsPerPage));
                        if (idx >= titlePageIndex) globalPageCounter++;
                        for (let p = 0; p < pagesCount; p++) {
                            allPages.push({
                                id: `${sec.id}-${p}`, sectionId: sec.id, type: sec.type,
                                content: text.substring(p * charsPerPage, (p + 1) * charsPerPage),
                                pageNumber: globalPageCounter,
                                showNumber: (sec.type === 'textual' || sec.type === 'references'),
                                isFirst: p === 0, title: sec.title
                            });
                            if (p < pagesCount - 1 && idx >= titlePageIndex) globalPageCounter++;
                        }
                    }
                });
                return allPages;
            };

            const allPagesData = getPages();

            const PageRenderer = ({ page, isPrint = false }) => {
                const lines = page.content.split('\n').filter(l => l.trim() !== "" || l === "");
                const dynamicStyle = { fontFamily: fontFamily === 'Arial' ? 'Arial, sans-serif' : '"Times New Roman", serif', fontSize: '12pt', lineHeight: '1.5' };

                // Layout Académico Especial para Capa e Folha de Rosto
                if (page.type === 'cover' || page.type === 'title_page') {
                    const authorLine = lines.find(l => l.toUpperCase() === l && l.length > 3 && !l.includes('UNIVERSIDADE') && !l.includes('FACULDADE'));
                    const titleLine = lines.find(l => l.length > 20);
                    const locationLines = lines.slice(-2);
                    const institutionLines = lines.filter(l => l.includes('UNIVERSIDADE') || l.includes('FACULDADE') || l.includes('CENTRO'));
                    const descriptionLine = lines.find(l => l.length > 50 && !l.includes('UNIVERSIDADE') && l !== titleLine);

                    return (
                        <div className={isPrint ? 'abnt-page-print' : 'abnt-page-screen'} style={dynamicStyle}>
                            <div className="flex flex-col h-full text-center uppercase font-bold justify-between py-2">
                                {/* Topo: Instituição e Autor */}
                                <div className="space-y-8">
                                    <div className="space-y-1">{institutionLines.map((l, i) => <div key={i}>{l}</div>)}</div>
                                    <div className="mt-12">{authorLine || lines[3]}</div>
                                </div>
                                
                                {/* Centro: Título */}
                                <div className="flex-1 flex flex-col justify-center">
                                    <div className="text-xl px-4 break-words">{titleLine || "TÍTULO DO TRABALHO"}</div>
                                    
                                    {/* Natureza do Trabalho (Apenas Folha de Rosto) */}
                                    {page.type === 'title_page' && descriptionLine && (
                                        <div className="mt-8 text-left lowercase font-normal normal-case text-[10pt] leading-tight" style={{ marginLeft: '50%', textTransform: 'none' }}>
                                            {descriptionLine}
                                        </div>
                                    )}
                                </div>

                                {/* Base: Local e Ano */}
                                <div className="mt-auto space-y-1">
                                    {locationLines.map((l, i) => <div key={i}>{l}</div>)}
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className={isPrint ? 'abnt-page-print' : 'abnt-page-screen'} style={dynamicStyle}>
                        {page.showNumber && <div className="absolute top-[2cm] right-[2cm] font-normal text-sm">{page.pageNumber}</div>}
                        <div className="w-full">
                            {page.isFirst && <h2 className="text-center font-bold uppercase mb-12">{page.title}</h2>}
                            <div className="whitespace-pre-wrap text-justify">
                                {page.content.split('\n').map((l, i) => (
                                    <p key={i} className="mb-4" style={{ textIndent: (page.type === 'references' || l.trim() === "") ? '0' : '1.25cm' }}>{l}</p>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const handleExport = (all) => {
                setIsGeneratingPdf(true);
                const portal = document.getElementById('print-container');
                portal.innerHTML = '';
                const pages = all ? allPagesData : allPagesData.filter(p => p.sectionId === activeSectionId);
                
                // Renderização manual para o portal de impressão
                pages.forEach(p => {
                    const root = document.createElement('div');
                    portal.appendChild(root);
                    ReactDOM.createRoot(root).render(<PageRenderer page={p} isPrint={true} />);
                });

                setTimeout(() => { setIsGeneratingPdf(false); window.print(); }, 1500);
            };

            if (authStatus === 'loading') return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black animate-pulse">Lex ABNT v12 - Formatando Capas...</div>;

            return (
                <div id="ui-root">
                    {isGeneratingPdf && (
                        <div className="loading-overlay">
                            <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <h2 className="font-black uppercase tracking-widest text-sm">Organizando Layout Académico</h2>
                            <p className="text-slate-400 text-[10px] mt-2">A preparar Capa, Folha de Rosto e Paginação...</p>
                        </div>
                    )}

                    <div className="flex h-screen overflow-hidden print-hidden">
                        <aside className="w-80 bg-slate-900 text-white flex flex-col shadow-2xl z-30">
                            <div className="p-6 bg-slate-950 border-b border-slate-800 flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl"><i data-lucide="scale" className="w-5 h-5"></i></div>
                                <div><h1 className="font-black italic uppercase tracking-tighter text-lg leading-none">Lex ABNT</h1><p className="text-[8px] text-slate-500 font-bold uppercase mt-1">UFRJ Edition v12</p></div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-1 custom-scroll">
                                {sections.map(s => {
                                    const firstPage = allPagesData.find(p => p.sectionId === s.id && p.isFirst);
                                    return (
                                        <button key={s.id} onClick={() => { setActiveSectionId(s.id); activeIdRef.current = s.id; isTypingRef.current = false; }} className={`w-full text-left p-4 rounded-2xl text-[11px] font-bold uppercase transition-all flex justify-between items-center group ${activeSectionId === s.id ? 'bg-blue-600 text-white shadow-lg translate-x-1' : 'hover:bg-slate-800 text-slate-400'}`}>
                                            <span className="truncate">{s.title}</span>
                                            {firstPage?.pageNumber > 0 && <span className={`text-[9px] px-2 py-0.5 rounded-full ${activeSectionId === s.id ? 'bg-blue-500 border border-white/20' : 'bg-slate-950'}`}>P.{firstPage.pageNumber}</span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </aside>

                        <main className="flex-1 flex flex-col min-w-0">
                            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-20">
                                <div className="flex bg-slate-100 p-1 rounded-xl gap-1 border border-slate-200">
                                    <button onClick={() => setViewMode('edit')} className={`px-6 py-2 rounded-lg text-[10px] font-black transition-all ${viewMode === 'edit' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>ESCREVER</button>
                                    <button onClick={() => setViewMode('preview')} className={`px-6 py-2 rounded-lg text-[10px] font-black transition-all ${viewMode === 'preview' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>VER FOLHAS</button>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full border ${syncStatus === 'syncing' ? 'bg-orange-50 text-orange-600 border-orange-200' : 'bg-green-50 text-green-600 border-green-200'} text-[9px] font-black`}>
                                        {syncStatus === 'syncing' ? <i data-lucide="rotate-cw" className="w-3 h-3 animate-spin"></i> : <i data-lucide="check" className="w-3 h-3"></i>}
                                        <span>{syncStatus === 'syncing' ? 'A GUARDAR...' : 'GUARDADO'}</span>
                                    </div>
                                    <button onClick={() => handleExport(false)} className="bg-slate-800 text-white px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase hover:bg-black transition-all flex items-center gap-2 shadow-md"><i data-lucide="printer" className="w-4 h-4"></i> SEÇÃO</button>
                                    <button onClick={() => handleExport(true)} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase hover:bg-blue-700 shadow-lg flex items-center gap-2 border border-blue-500 active:scale-95"><i data-lucide="file-check" className="w-4 h-4"></i> PDF COMPLETO</button>
                                </div>
                            </header>

                            <div className="flex-1 overflow-y-auto p-12 flex flex-col items-center custom-scroll bg-slate-50">
                                {viewMode === 'edit' ? (
                                    <div className="w-full max-w-4xl flex flex-col bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
                                        <div className="px-10 py-6 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                            <h2 className="text-[13px] font-black text-slate-800 uppercase tracking-tight">{activeSection?.title}</h2>
                                            <select value={fontFamily} onChange={e => setFontFamily(e.target.value)} className="text-[10px] font-black bg-white border border-slate-200 rounded-lg px-4 py-2 shadow-sm cursor-pointer outline-none">
                                                <option value="Arial">ARIAL (UFRJ)</option>
                                                <option value="Times">TIMES NEW ROMAN</option>
                                            </select>
                                        </div>
                                        <textarea className="flex-1 p-16 focus:outline-none resize-none text-[12pt] leading-[1.5] text-slate-800 min-h-[700px] selection:bg-blue-100" style={{ fontFamily: fontFamily === 'Arial' ? 'Arial, sans-serif' : '"Times New Roman", serif' }} value={localText} onChange={(e) => { isTypingRef.current = true; setLocalText(e.target.value); }} />
                                    </div>
                                ) : (
                                    <div className="scale-90 origin-top pb-20">
                                        {allPagesData.filter(p => p.sectionId === activeSectionId).map(p => <PageRenderer key={p.id} page={p} isPrint={false} />)}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
