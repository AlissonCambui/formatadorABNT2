<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex ABNT - Alisson Pro Edition v17</title>
    
    <!-- Bibliotecas via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, query, updateDoc, setDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxSDZ3J_Q9sdVkC9S7wYmqSbTjatxLab0",
            authDomain: "formatador-abnt-multiusuarios.firebaseapp.com",
            projectId: "formatador-abnt-multiusuarios",
            storageBucket: "formatador-abnt-multiusuarios.firebasestorage.app",
            messagingSenderId: "939976247624",
            appId: "1:939976247624:web:d142f11e531234507a0b7d"
        };

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, onSnapshot, query, updateDoc, setDoc, getDocs, writeBatch, firebaseConfig };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        @media print {
            @page { size: A4; margin: 0; }
            html, body { background: white !important; height: auto !important; overflow: visible !important; }
            #root { display: none !important; }
            #print-container { display: block !important; width: 210mm !important; margin: 0 !important; background: white !important; }
            .abnt-page-print { 
                display: flex !important;
                flex-direction: column;
                width: 210mm !important;
                height: 297mm !important;
                padding: 3cm 2cm 2cm 3cm !important;
                box-sizing: border-box !important;
                background: white !important;
                position: relative !important;
                page-break-after: always !important;
                break-after: page !important;
                color: black !important;
                overflow: hidden !important;
            }
        }
        
        .abnt-page-screen {
            width: 21cm;
            min-height: 29.7cm;
            padding: 3cm 2cm 2cm 3cm;
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin: 20px auto;
            position: relative;
            box-sizing: border-box;
            color: black;
            display: flex;
            flex-direction: column;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="print-container" style="display: none;"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MANDATORY_SECTIONS = [
            { title: 'Capa', content: 'UNIVERSIDADE ANHANGUERA\nFACULDADE DE DIREITO\n\nRENATA BISPO CAMBUI\n\nPROJETO DE EXTENSÃO: INIMPUTABILIDADE PENAL E SAÚDE MENTAL\n\nSão Paulo\n2026', type: 'cover', order: 0 },
            { title: 'Folha de Rosto', content: 'Monografia apresentada à Faculdade de Direito da Universidade Anhanguera como requisito para obtenção do grau de Bacharel em Direito.\n\nOrientador: Prof. Ms. Hamilton Gonçalves Ferraz', type: 'title_page', order: 1 },
            { title: 'Resumo', content: 'Resumo do trabalho...', type: 'pre-textual', order: 2 },
            { title: 'Sumário', content: 'INTRODUÇÃO\n1. DESENVOLVIMENTO\nCONCLUSÃO\nREFERÊNCIAS', type: 'pre-textual', order: 3 },
            { title: 'Introdução', content: 'Texto inicial...', type: 'textual', order: 4 },
            { title: 'Desenvolvimento', content: 'Conteúdo...', type: 'textual', order: 5 },
            { title: 'Conclusão', content: 'Conclusão...', type: 'textual', order: 6 },
            { title: 'Referências Bibliográficas', content: 'AMARANTE, Paulo. Loucos pela Vida. Rio de Janeiro: Fiocruz, 2013.', type: 'references', order: 7 },
        ];

        const stringToColor = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
            return "#" + "00000".substring(0, 6 - c.length) + c;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [authStatus, setAuthStatus] = useState('loading');
            const [sections, setSections] = useState([]);
            const [onlineUsers, setOnlineUsers] = useState([]);
            const [activeSectionId, setActiveSectionId] = useState(null);
            const [localText, setLocalText] = useState('');
            const [viewMode, setViewMode] = useState('edit');
            const [syncStatus, setSyncStatus] = useState('synced');
            const [fontFamily, setFontFamily] = useState('Arial');
            const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);
            const [userName, setUserName] = useState(localStorage.getItem('lex_abnt_user_name') || 'Utilizador');

            const isTypingRef = useRef(false);
            const activeIdRef = useRef(null);
            const appId = 'abnt-ufrj-alisson-v17';

            useEffect(() => { if (window.lucide) lucide.createIcons(); });

            // Inicialização Automática (Sem bloqueio de ecrã)
            useEffect(() => {
                const init = async () => {
                    if (window.FB) {
                        const app = window.FB.initializeApp(window.FB.firebaseConfig);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        try {
                            const cred = await window.FB.signInAnonymously(window.FB.getAuth(app));
                            setUser(cred.user);
                            setAuthStatus('authenticated');
                            // Actualiza presença inicial
                            await updatePresence(firestore, cred.user.uid, userName);
                        } catch (e) { setAuthStatus('error'); }
                    }
                };
                init();
            }, []);

            const updatePresence = async (firestore, uid, name) => {
                const presenceRef = window.FB.doc(firestore, 'artifacts', appId, 'public', 'data', 'presence', uid);
                await window.FB.setDoc(presenceRef, {
                    uid: uid,
                    name: name,
                    lastActive: Date.now(),
                    color: stringToColor(uid)
                });
            };

            const handleNameChange = (newName) => {
                setUserName(newName);
                localStorage.setItem('lex_abnt_user_name', newName);
                if (user && db) updatePresence(db, user.uid, newName);
            };

            // Heartbeat
            useEffect(() => {
                if (user && db) {
                    const timer = setInterval(() => {
                        const presenceRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'presence', user.uid);
                        window.FB.updateDoc(presenceRef, { lastActive: Date.now() });
                    }, 20000);
                    return () => clearInterval(timer);
                }
            }, [user, db]);

            // Sincronização
            useEffect(() => {
                if (!user || !db) return;
                const sectionsRef = window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'sections');
                const presenceRef = window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'presence');

                const unsubSec = window.FB.onSnapshot(sectionsRef, (snap) => {
                    if (snap.empty) {
                        const batch = window.FB.writeBatch(db);
                        MANDATORY_SECTIONS.forEach(sec => {
                            const newDoc = window.FB.doc(sectionsRef);
                            batch.set(newDoc, { ...sec, createdAt: Date.now(), lastEditedBy: user.uid });
                        });
                        batch.commit();
                    } else {
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => a.order - b.order);
                        setSections(docs);
                        if (!activeIdRef.current && docs.length > 0) {
                            setActiveSectionId(docs[0].id);
                            activeIdRef.current = docs[0].id;
                        }
                    }
                });

                const unsubPresence = window.FB.onSnapshot(presenceRef, (snap) => {
                    const now = Date.now();
                    setOnlineUsers(snap.docs.map(d => d.data()).filter(u => (now - u.lastActive) < 60000));
                });

                return () => { unsubSec(); unsubPresence(); };
            }, [user, db]);

            const activeSection = sections.find(s => s.id === activeSectionId);
            
            useEffect(() => {
                if (!isTypingRef.current && activeSection) setLocalText(activeSection.content || '');
            }, [activeSectionId, activeSection?.content]);

            useEffect(() => {
                if (!isTypingRef.current) return;
                setSyncStatus('syncing');
                const timer = setTimeout(async () => {
                    if (!activeSectionId) return;
                    const sectionRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'sections', activeSectionId);
                    await window.FB.updateDoc(sectionRef, { content: localText, updatedAt: Date.now(), lastEditedBy: user.uid });
                    setSyncStatus('synced');
                    isTypingRef.current = false;
                }, 800);
                return () => clearTimeout(timer);
            }, [localText]);

            const metadata = (() => {
                const cover = sections.find(s => s.type === 'cover');
                const text = (activeSectionId === cover?.id) ? localText : (cover?.content || '');
                const lines = text.split('\n').filter(l => l.trim() !== "");
                return {
                    institution: lines.slice(0, 2).join('\n'),
                    author: lines[2] || "NOME DO AUTOR",
                    footer: lines.slice(-2).join('\n'),
                    title: lines.slice(3, -2).join('\n')
                };
            })();

            const allPagesData = (() => {
                let globalCounter = 0; 
                let results = [];
                const titlePageIndex = sections.findIndex(s => s.type === 'title_page');
                sections.forEach((sec, idx) => {
                    const text = (sec.id === activeSectionId) ? localText : (sec.content || '');
                    const charsPerPage = 2100;
                    const pages = Math.max(1, Math.ceil(text.length / charsPerPage));
                    if (idx >= titlePageIndex) globalCounter++;
                    for (let p = 0; p < pages; p++) {
                        results.push({
                            id: `${sec.id}-${p}`, sectionId: sec.id, type: sec.type, title: sec.title,
                            content: text.substring(p * charsPerPage, (p + 1) * charsPerPage),
                            pageNumber: globalCounter,
                            showNumber: (sec.type === 'textual' || sec.type === 'references'),
                            isFirst: p === 0
                        });
                        if (p < pages - 1 && idx >= titlePageIndex) globalCounter++;
                    }
                });
                return results;
            })();

            const PageRenderer = ({ page, isPrint = false }) => {
                const style = { fontFamily: fontFamily === 'Arial' ? 'Arial, sans-serif' : '"Times New Roman", serif', fontSize: '12pt', lineHeight: '1.5' };
                if (page.type === 'cover' || page.type === 'title_page') {
                    return (
                        <div className={isPrint ? 'abnt-page-print' : 'abnt-page-screen'} style={style}>
                            <div className="flex flex-col h-full text-center uppercase font-bold justify-between py-2">
                                <div className="space-y-6">
                                    {page.type === 'cover' && <div className="whitespace-pre-line">{metadata.institution}</div>}
                                    <div className={page.type === 'cover' ? "mt-12" : "mt-6"}>{metadata.author}</div>
                                </div>
                                <div className="flex-1 flex flex-col justify-center">
                                    <div className="text-xl px-4 leading-tight whitespace-pre-line">{metadata.title}</div>
                                    {page.type === 'title_page' && <div className="mt-10 text-justify lowercase font-normal normal-case text-[10pt] leading-relaxed" style={{ marginLeft: '45%', textTransform: 'none' }}>{page.content}</div>}
                                </div>
                                <div className="mt-auto whitespace-pre-line">{metadata.footer}</div>
                            </div>
                        </div>
                    );
                }
                return (
                    <div className={isPrint ? 'abnt-page-print' : 'abnt-page-screen'} style={style}>
                        {page.showNumber && <div className="absolute top-[2cm] right-[2cm] font-normal text-sm">{page.pageNumber}</div>}
                        <div className="w-full">
                            {page.isFirst && <h2 className="text-center font-bold uppercase mb-12">{page.title}</h2>}
                            <div className="whitespace-pre-wrap text-justify">
                                {page.content.split('\n').map((l, i) => <p key={i} className="mb-4" style={{ textIndent: (page.type === 'references' || l.trim() === "") ? '0' : '1.25cm' }}>{l}</p>)}
                            </div>
                        </div>
                    </div>
                );
            };

            const handleExport = (all) => {
                setIsGeneratingPdf(true);
                const portal = document.getElementById('print-container');
                portal.innerHTML = '';
                const pages = all ? allPagesData : allPagesData.filter(p => p.sectionId === activeSectionId);
                pages.forEach(p => {
                    const root = document.createElement('div');
                    portal.appendChild(root);
                    ReactDOM.createRoot(root).render(<PageRenderer page={p} isPrint={true} />);
                });
                setTimeout(() => { setIsGeneratingPdf(false); window.print(); }, 1200);
            };

            if (authStatus === 'loading') return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black animate-pulse uppercase">Lex ABNT v17 - Acesso Direto...</div>;

            return (
                <div id="ui-root">
                    {isGeneratingPdf && (
                        <div className="fixed inset-0 z-[500] bg-slate-900/90 flex flex-col items-center justify-center text-white">
                            <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <h2 className="font-black uppercase tracking-widest text-sm">Gerando PDF Integrado</h2>
                        </div>
                    )}

                    <div className="flex h-screen overflow-hidden">
                        <aside className="w-80 bg-slate-900 text-white flex flex-col shadow-2xl z-30">
                            <div className="p-6 bg-slate-950 border-b border-slate-800 flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl"><i data-lucide="layout-dashboard" className="w-5 h-5"></i></div>
                                <div><h1 className="font-black italic uppercase tracking-tighter text-lg leading-none">Lex ABNT</h1><p className="text-[8px] text-slate-500 font-bold uppercase mt-1">UFRJ EDITION v17</p></div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto custom-scroll p-4 space-y-6">
                                <div className="space-y-1">
                                    <p className="text-[10px] font-black text-slate-600 uppercase tracking-widest mb-4 px-2">Estrutura</p>
                                    {sections.map(s => {
                                        const firstPage = allPagesData.find(p => p.sectionId === s.id && p.isFirst);
                                        return (
                                            <button key={s.id} onClick={() => { setActiveSectionId(s.id); activeIdRef.current = s.id; isTypingRef.current = false; }} className={`w-full text-left p-3 rounded-xl text-[11px] font-bold uppercase transition-all flex justify-between items-center group ${activeSectionId === s.id ? 'bg-blue-600 text-white shadow-xl' : 'hover:bg-slate-800 text-slate-400'}`}>
                                                <span className="truncate">{s.title}</span>
                                                {firstPage?.pageNumber > 0 && <span className={`text-[9px] px-2 py-0.5 rounded-full ${activeSectionId === s.id ? 'bg-blue-500' : 'bg-slate-950'}`}>P.{firstPage.pageNumber}</span>}
                                            </button>
                                        );
                                    })}
                                </div>

                                <div className="pt-6 border-t border-slate-800">
                                    <p className="text-[10px] font-black text-slate-600 uppercase tracking-widest mb-4 px-2">Quem está online</p>
                                    <div className="space-y-3 px-2">
                                        {onlineUsers.map(u => (
                                            <div key={u.uid} className="flex items-center gap-3">
                                                <div className="user-avatar" style={{ backgroundColor: u.color }}>{u.name.substring(0, 1).toUpperCase()}</div>
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] font-bold text-slate-200">{u.name} {u.uid === user?.uid && "(Tu)"}</span>
                                                    <span className="text-[8px] text-green-500 font-bold uppercase tracking-tighter">Online</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="p-4 bg-slate-950 border-t border-slate-800">
                                <p className="text-[9px] font-bold text-slate-600 uppercase mb-2">Identificação:</p>
                                <input 
                                    type="text" 
                                    className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-blue-500 transition-all"
                                    value={userName}
                                    onChange={(e) => handleNameChange(e.target.value)}
                                />
                            </div>
                        </aside>

                        <main className="flex-1 flex flex-col min-w-0 bg-slate-50">
                            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-20">
                                <div className="flex bg-slate-100 p-1 rounded-xl gap-1 border border-slate-200">
                                    <button onClick={() => setViewMode('edit')} className={`px-6 py-2 rounded-lg text-[10px] font-black tracking-widest transition-all ${viewMode === 'edit' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>EDITAR</button>
                                    <button onClick={() => setViewMode('preview')} className={`px-6 py-2 rounded-lg text-[10px] font-black tracking-widest transition-all ${viewMode === 'preview' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>VISUALIZAR</button>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full border ${syncStatus === 'syncing' ? 'bg-orange-50 text-orange-600 border-orange-200' : 'bg-green-50 text-green-600 border-green-200'} text-[9px] font-black uppercase`}>
                                        {syncStatus === 'syncing' ? <i data-lucide="rotate-cw" className="w-3 h-3 animate-spin"></i> : <i data-lucide="check" className="w-3 h-3"></i>}
                                        <span>{syncStatus === 'syncing' ? 'Salvando...' : 'Sincronizado'}</span>
                                    </div>
                                    <button onClick={() => handleExport(false)} className="bg-slate-800 text-white px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase hover:bg-black transition-all flex items-center gap-2 shadow-md"><i data-lucide="printer" className="w-4 h-4"></i> SEÇÃO</button>
                                    <button onClick={() => handleExport(true)} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase hover:bg-blue-700 shadow-lg flex items-center gap-2 border border-blue-500 active:scale-95"><i data-lucide="file-check" className="w-4 h-4"></i> PDF COMPLETO</button>
                                </div>
                            </header>

                            <div className="flex-1 overflow-y-auto p-12 flex flex-col items-center custom-scroll">
                                {viewMode === 'edit' ? (
                                    <div className="w-full max-w-4xl flex flex-col bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
                                        <div className="px-10 py-6 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                            <h2 className="text-[13px] font-black text-slate-800 uppercase tracking-tight">{activeSection?.title}</h2>
                                            <select value={fontFamily} onChange={e => setFontFamily(e.target.value)} className="text-[10px] font-black bg-white border border-slate-200 rounded-lg px-4 py-2 shadow-sm outline-none">
                                                <option value="Arial">ARIAL (UFRJ)</option>
                                                <option value="Times">TIMES NEW ROMAN</option>
                                            </select>
                                        </div>
                                        <textarea className="flex-1 p-16 focus:outline-none resize-none text-[12pt] leading-[1.5] text-slate-800 min-h-[700px] selection:bg-blue-100" style={{ fontFamily: fontFamily === 'Arial' ? 'Arial, sans-serif' : '"Times New Roman", serif' }} value={localText} onChange={(e) => { isTypingRef.current = true; setLocalText(e.target.value); }} />
                                    </div>
                                ) : (
                                    <div className="scale-90 origin-top pb-20">
                                        {allPagesData.filter(p => p.sectionId === activeSectionId).map(p => <PageRenderer key={p.id} page={p} isPrint={false} />)}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
